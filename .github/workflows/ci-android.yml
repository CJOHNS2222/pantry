name: CI - Build Android Release

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-release:
    name: Build Android Release (example)
    runs-on: ubuntu-latest
    env:
      # Secrets referenced below must be added to the repository's Secrets
      # FIREBASE_SERVICE_ACCOUNT_JSON - full JSON content
      # SENTRY_AUTH_TOKEN - Sentry auth token
      # RELEASE_STORE_BASE64 - base64 of the keystore file
      # RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Restore Firebase service account (if provided)
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "Restoring Firebase service account JSON"
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}" > ./firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=./firebase-service-account.json" >> $GITHUB_ENV

      - name: Configure Sentry token
        if: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> $GITHUB_ENV

      - name: Restore Android keystore (if provided)
        if: ${{ secrets.RELEASE_STORE_BASE64 }}
        run: |
          mkdir -p android
          echo "${{ secrets.RELEASE_STORE_BASE64 }}" | base64 --decode > android/pantry-release.keystore

      - name: Write android/gradle.properties for signing
        run: |
          cat > android/gradle.properties <<'EOF'
          RELEASE_STORE_FILE=pantry-release.keystore
          RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          EOF

      - name: Install dependencies
        run: |
          npm ci

      - name: Build web assets
        run: |
          npm run build

      - name: Sync Capacitor Android
        run: |
          npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build Android Release (Gradle)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon -Pandroid.injected.testOnly=false

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: android/app/build/outputs/**/*.apk

      - name: Cleanup sensitive files
        run: |
          rm -f ./firebase-service-account.json || true
          rm -f android/pantry-release.keystore || true

# Notes:
# - This is an example template. Adjust node/java versions, build commands, and signing steps
#   to match your CI environment. Ensure secrets are added in Settings → Secrets and variables → Actions.
# - Consider using GitHub's actions/cache for npm and Gradle caches for faster runs.
