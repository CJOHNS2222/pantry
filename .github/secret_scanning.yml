# Secret scanning exclusions
# Paths listed here will be ignored by GitHub secret scanning alerts
# and will also skip push protection checks.
# Keep this list as narrow as possible — review it periodically.

paths-ignore:
  # Example/template files that intentionally show placeholder keys
  - "**/*.example"
  - "**/*.example.*"
  - "**/.env.example"

  # Test fixtures that may contain fake/sample credential strings
  - "tests/**"
  - "src/test/**"
  - "**/__mocks__/**"

  # Spoonacular API client samples (third-party, not org secrets)
  - "spoonacular-api-clients/**"
