framework = { group = "org.apache.cordova", name = "framework", version.ref = "cordova-framework" }
billing = { group = "com.android.billingclient", name = "billing", version.ref = "billing" }

[plugins]
android-application = { id = "com.android.application", version.ref = "agp" }
google-services = { id = "com.google.gms.google-services", version = "4.4.4" }
firebase-appdistribution = { id = "com.google.firebase.appdistribution", version = "5.2.1" }
firebase-crashlytics = { id = "com.google.firebase.crashlytics", version = "3.0.6" }
firebase-perf = { id = "com.google.firebase.firebase-perf", version = "2.0.2" }
sentry = { id = "io.sentry.android.gradle", version.ref = "sentry" }
