plugins {
    id 'com.android.application'
    id 'com.google.gms.google-services'
    id 'com.google.firebase.appdistribution'
    id 'com.google.firebase.crashlytics'
    id 'com.google.firebase.firebase-perf'

    id 'io.sentry.android.gradle' version '5.12.2'
}


android {
    namespace "com.smart.pantry"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.smart.pantry"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 9
        versionName "1.3.5"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
        
        // Enable native debug symbols for crash reporting
        ndk {
            debugSymbolLevel 'SYMBOL_TABLE'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    java {
        toolchain {
            languageVersion = JavaLanguageVersion.of(21)
        }
    }
    signingConfigs {
        release {
            // Read signing configuration from project properties or fall back to local defaults.
            // For local builds, copy `android/gradle.properties.example` to `android/gradle.properties`
            // and set RELEASE_STORE_FILE, RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD.
            def keystoreFile = project.hasProperty('RELEASE_STORE_FILE') ? file(RELEASE_STORE_FILE) : file('pantry-release.keystore')
            def storePasswordVal = project.hasProperty('RELEASE_STORE_PASSWORD') ? RELEASE_STORE_PASSWORD : ''
            def keyAliasVal = project.hasProperty('RELEASE_KEY_ALIAS') ? RELEASE_KEY_ALIAS : 'pantry-key'
            def keyPasswordVal = project.hasProperty('RELEASE_KEY_PASSWORD') ? RELEASE_KEY_PASSWORD : ''

            storeFile keystoreFile
            storePassword storePasswordVal
            keyAlias keyAliasVal
            keyPassword keyPasswordVal
        }
    }
    buildTypes {
        debug {
            // Enable native debug symbols for debug builds too
            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
            }
        }
        release {
            // Code is not minified/obfuscated, so no deobfuscation file needed
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            
            // Enable native debug symbols for crash reporting
            ndk {
                debugSymbolLevel 'SYMBOL_TABLE'
            }
            
            firebaseAppDistribution {
                artifactType="APK"
                releaseNotesFile="${rootDir}/release-notes.txt"
                testersFile="${rootDir}/testers.txt"
            }
        }
    }
    }


dependencies {
  // Import the Firebase BoM
  implementation platform('com.google.firebase:firebase-bom:34.7.0')

  // Add the dependencies for the Crashlytics and Analytics libraries
  implementation 'com.google.firebase:firebase-crashlytics'
  implementation 'com.google.firebase:firebase-analytics'

  // Add the dependency for the Performance Monitoring library
  implementation 'com.google.firebase:firebase-perf'


  // TODO: Add the dependencies for Firebase products you want to use
  // When using the BoM, don't specify versions in Firebase dependencies
  implementation 'com.google.firebase:firebase-auth'
  implementation 'com.google.firebase:firebase-firestore'
  implementation 'com.google.firebase:firebase-functions'
  implementation 'com.google.firebase:firebase-storage'
  // End of Firebase dependencies
  // Add the dependencies for any other desired Firebase products
  // https://firebase.google.com/docs/android/setup#available-libraries

  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
  implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
  implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
  implementation project(':capacitor-android')
  testImplementation "junit:junit:$junitVersion"
  androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
  androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
  implementation project(':capacitor-cordova-android-plugins')


}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}


sentry {
    org = "smart-pantry"
    projectName = "smartpantry"

    // this will upload your source code to Sentry to show it as part of the stack traces
    // disable if you don't want to expose your sources
    includeSourceContext = false
}
