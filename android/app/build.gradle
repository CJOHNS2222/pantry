plugins {
    id 'com.android.application'
    alias libs.plugins.google.services
    alias libs.plugins.firebase.appdistribution
    alias libs.plugins.firebase.crashlytics
    alias libs.plugins.firebase.perf

    alias libs.plugins.sentry
}


android {
    namespace "com.smart.pantry"
    compileSdk libs.versions.compileSdk.get().toInteger()
    defaultConfig {
        applicationId "com.smart.pantry"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 16
        versionName "1.4.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    signingConfigs {
        release {
            def keystoreFile = project.hasProperty('RELEASE_STORE_FILE') ? file(RELEASE_STORE_FILE) : file('pantry-release.keystore')
            def storePasswordVal = project.hasProperty('RELEASE_STORE_PASSWORD') ? RELEASE_STORE_PASSWORD : ''
            def keyAliasVal = project.hasProperty('RELEASE_KEY_ALIAS') ? RELEASE_KEY_ALIAS : 'pantry-key'
            def keyPasswordVal = project.hasProperty('RELEASE_KEY_PASSWORD') ? RELEASE_KEY_PASSWORD : ''

            storeFile keystoreFile
            storePassword storePasswordVal
            keyAlias keyAliasVal
            keyPassword keyPasswordVal
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            
            firebaseAppDistribution {
                artifactType="APK"
                releaseNotesFile="${rootDir}/release-notes.txt"
                testersFile="${rootDir}/testers.txt"
            }
        }
    }
}


dependencies {
  implementation platform(libs.firebase.bom)
  implementation libs.firebase.analytics
  implementation libs.firebase.crashlytics
  implementation libs.firebase.perf
  implementation libs.firebase.auth
  implementation libs.firebase.firestore
  implementation libs.firebase.functions
  implementation libs.firebase.storage

  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation libs.androidx.appcompat
  implementation libs.androidx.coordinatorlayout
  implementation libs.androidx.core.splashscreen
  implementation project(':capacitor-android')
  testImplementation libs.junit
  androidTestImplementation libs.androidx.junit
  androidTestImplementation libs.androidx.espresso.core
  implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

sentry {
    org = "smart-pantry"
    projectName = "smartpantry"
    includeSourceContext = false
}
