plugins {
    alias libs.plugins.android.application
    alias libs.plugins.google.services
    alias libs.plugins.firebase.appdistribution
    alias libs.plugins.firebase.crashlytics
    alias libs.plugins.firebase.perf

    alias libs.plugins.sentry
}


android {
    namespace "com.smart.pantry"
    compileSdk libs.versions.compileSdk.get().toInteger()
    defaultConfig {
        applicationId "com.smart.pantry"
        minSdk 24
        targetSdk 36
        versionCode 28
        versionName "1.5.3"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        buildFeatures {
            resValues = true
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    signingConfigs {
        release {
            def keystoreFile = file('pantry-release-new.keystore')
            def storePasswordVal = 'pantry123'
            def keyAliasVal = 'pantry-key'
            def keyPasswordVal = 'pantry123'

            storeFile keystoreFile
            storePassword storePasswordVal
            keyAlias keyAliasVal
            keyPassword keyPasswordVal
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
            
            firebaseAppDistribution {
                artifactType="APK"
                releaseNotesFile="${rootDir}/release-notes.txt"
                testersFile="${rootDir}/testers.txt"
            }
        }
    }
}


dependencies {
  implementation platform(libs.firebase.bom)
  implementation libs.firebase.analytics
  implementation libs.firebase.crashlytics
  implementation libs.firebase.perf
  implementation libs.firebase.auth
  implementation libs.firebase.firestore
  implementation libs.firebase.functions
  implementation libs.firebase.storage

  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation libs.androidx.appcompat
  implementation libs.androidx.coordinatorlayout
  implementation libs.androidx.core.splashscreen
  implementation project(':capacitor-android')
  testImplementation libs.junit
  androidTestImplementation libs.androidx.junit
  androidTestImplementation libs.androidx.espresso.core
  implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

sentry {
    org = "smart-pantry"
    projectName = "smartpantry"
    includeSourceContext = false
    includeDependenciesReport = false
}
