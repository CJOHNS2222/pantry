plugins {
    alias libs.plugins.android.application
    alias libs.plugins.google.services apply false
    alias libs.plugins.firebase.appdistribution apply false
    alias libs.plugins.firebase.crashlytics apply false
    alias libs.plugins.firebase.perf apply false

    alias libs.plugins.sentry
}

if (file('google-services.json').exists()) {
    apply plugin: 'com.google.gms.google-services'
    apply plugin: 'com.google.firebase.appdistribution'
    apply plugin: 'com.google.firebase.crashlytics'
    apply plugin: 'com.google.firebase.firebase-perf'
}


android {
    namespace = "com.smart.pantry"
    compileSdk libs.versions.compileSdk.get().toInteger()
    defaultConfig {
        applicationId "com.smart.pantry"
        minSdk 24
        targetSdk 35
        versionCode 100
        versionName "3.0.7"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        
        buildFeatures {
            resValues = true
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
    signingConfigs {
        release {
            def keystoreFile = file('pantry-release.keystore')
            def storePasswordVal = '63789632aA!'
            def keyAliasVal = 'key0'
            def keyPasswordVal = '63789632aA!'

            storeFile keystoreFile
            storePassword storePasswordVal
            keyAlias keyAliasVal
            keyPassword keyPasswordVal
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig = signingConfigs.release
            
            ndk {
                debugSymbolLevel = 'SYMBOL_TABLE'
            }
            
            pluginManager.withPlugin('com.google.firebase.appdistribution') {
                firebaseAppDistribution {
                    artifactType="APK"
                    releaseNotesFile="${rootDir}/release-notes.txt"
                    testersFile="${rootDir}/testers.txt"
                }
            }
        }
    }
}


dependencies {
  implementation platform(libs.firebase.bom)
  implementation libs.firebase.analytics
  implementation libs.firebase.crashlytics
  implementation libs.firebase.perf
  implementation libs.firebase.auth
  implementation libs.firebase.firestore
  implementation libs.firebase.functions
  implementation libs.firebase.storage

  implementation fileTree(include: ['*.jar'], dir: 'libs')
  implementation libs.androidx.appcompat
  implementation libs.androidx.coordinatorlayout
  implementation libs.androidx.core.splashscreen
  implementation project(':capacitor-android')
  testImplementation libs.junit
  androidTestImplementation libs.androidx.junit
  androidTestImplementation libs.androidx.espresso.core
  implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

sentry {
    org = "smart-pantry"
    projectName = "smartpantry"
    includeSourceContext = false
    includeDependenciesReport = false
}
